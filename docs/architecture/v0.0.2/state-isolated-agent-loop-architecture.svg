<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="980" viewBox="0 0 1360 980" role="img" aria-labelledby="title desc">
  <title id="title">State-Isolated Agent Loop Architecture</title>
  <desc id="desc">Architecture diagram showing AgentLoop as the owner of session state, exposing a readonly model view and a minimal execution context.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff" />
      <stop offset="100%" stop-color="#edf3fb" />
    </linearGradient>
    <linearGradient id="center" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fff9" />
      <stop offset="100%" stop-color="#ebf7ef" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#57718c" />
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #16324f; }
      .subtitle { font: 14px Arial, sans-serif; fill: #536579; }
      .section { font: 700 15px Arial, sans-serif; fill: #1e3349; letter-spacing: 1px; }
      .box-title { font: 700 17px Arial, sans-serif; fill: #182736; }
      .box-text { font: 13px Arial, sans-serif; fill: #486074; }
      .small-text { font: 12px Arial, sans-serif; fill: #5a7287; }
      .chip-text { font: 12px Arial, sans-serif; fill: #3e5568; }
      .note { font: 12px Arial, sans-serif; fill: #667b90; }
      .flow { font: 12px Arial, sans-serif; fill: #5b7690; }
      .layer { stroke: rgba(33, 50, 69, 0.10); stroke-width: 1; }
      .box { fill: rgba(255, 255, 255, 0.96); stroke: rgba(33, 50, 69, 0.12); stroke-width: 1; }
      .soft { fill: rgba(255, 255, 255, 0.78); stroke: rgba(33, 50, 69, 0.10); stroke-width: 1; }
      .accent { fill: #fffbea; stroke: #d9c88f; stroke-width: 1; }
      .center-box { fill: url(#center); stroke: rgba(33, 50, 69, 0.14); stroke-width: 1.2; }
      .chip { fill: rgba(255, 255, 255, 0.92); stroke: rgba(33, 50, 69, 0.10); stroke-width: 1; }
      .arrow { fill: none; stroke: #57718c; stroke-width: 2.4; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #89a1b8; stroke-width: 2; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1360" height="980" fill="url(#bg)" />

  <text x="60" y="58" class="title">State-Isolated Minimal Agent Loop</text>
  <text x="60" y="86" class="subtitle">当前实现的重点从“能跑通”转到“谁持有真实状态，以及 model / executor 各自能看到什么”。</text>

  <rect x="40" y="120" rx="18" ry="18" width="1280" height="150" fill="#eaf4ff" class="layer" />
  <text x="66" y="150" class="section">ENTRY LAYER</text>
  <rect x="110" y="178" rx="12" ry="12" width="260" height="68" class="box" />
  <text x="134" y="205" class="box-title">User Input</text>
  <text x="134" y="226" class="small-text">任务文本，例如 hello</text>
  <rect x="470" y="178" rx="12" ry="12" width="320" height="68" class="box" />
  <text x="494" y="205" class="box-title">runDemo()</text>
  <text x="494" y="226" class="small-text">组装 DemoModel + DemoExecutor</text>
  <rect x="900" y="178" rx="12" ry="12" width="280" height="68" class="soft" />
  <text x="924" y="205" class="box-title">AgentRunResult</text>
  <text x="924" y="226" class="small-text">answer / steps / trace</text>
  <path d="M 370 212 L 470 212" class="arrow" />
  <path d="M 630 246 L 630 350" class="arrow" />

  <rect x="40" y="300" rx="18" ry="18" width="1280" height="470" fill="#eefbf3" class="layer" />
  <text x="66" y="330" class="section">CONTROL AND BOUNDARIES</text>

  <rect x="110" y="392" rx="14" ry="14" width="290" height="180" class="box" />
  <text x="134" y="424" class="box-title">ModelClient</text>
  <text x="134" y="448" class="box-text">decideNextAction(context)</text>
  <rect x="134" y="470" rx="10" ry="10" width="242" height="78" class="soft" />
  <text x="154" y="498" class="box-title">DemoModel</text>
  <text x="154" y="519" class="small-text">无 tool 结果时返回 builtin_call</text>
  <text x="154" y="538" class="small-text">有 action_result 后返回 final_answer</text>

  <rect x="480" y="350" rx="18" ry="18" width="400" height="310" class="center-box" />
  <text x="510" y="386" class="box-title">AgentLoop</text>
  <text x="510" y="410" class="box-text">runAgentLoop()</text>
  <text x="510" y="438" class="small-text">唯一真实状态持有者，负责循环推进、trace、messages、终止条件</text>
  <rect x="520" y="468" rx="12" ry="12" width="320" height="154" class="accent" />
  <text x="546" y="499" class="box-title">AgentSessionState</text>
  <text x="546" y="523" class="small-text">sessionId / userInput / currentStep</text>
  <text x="546" y="545" class="small-text">status / messages / trace / metadata</text>
  <text x="546" y="574" class="small-text">loop 内部真实状态</text>
  <text x="546" y="595" class="small-text">不会直接暴露给 model 或 executor</text>

  <rect x="960" y="392" rx="14" ry="14" width="290" height="180" class="box" />
  <text x="984" y="424" class="box-title">ActionExecutor</text>
  <text x="984" y="448" class="box-text">executeBuiltinCall(action, context)</text>
  <rect x="984" y="470" rx="10" ry="10" width="242" height="78" class="soft" />
  <text x="1004" y="498" class="box-title">DemoExecutor</text>
  <text x="1004" y="519" class="small-text">builtin registry</text>
  <text x="1004" y="538" class="small-text">当前演示 echo handler</text>

  <rect x="210" y="620" rx="12" ry="12" width="240" height="90" class="chip" />
  <text x="232" y="649" class="box-title">ModelContextView</text>
  <text x="232" y="671" class="chip-text">readonly snapshot</text>
  <text x="232" y="690" class="chip-text">recentEvents / messages / metadata</text>

  <rect x="910" y="620" rx="12" ry="12" width="240" height="90" class="chip" />
  <text x="932" y="649" class="box-title">ExecutionContext</text>
  <text x="932" y="671" class="chip-text">minimal context</text>
  <text x="932" y="690" class="chip-text">sessionId / currentStep / metadata</text>

  <path d="M 480 505 L 400 505" class="arrow" />
  <path d="M 880 505 L 960 505" class="arrow" />
  <path d="M 520 620 L 450 665" class="dash" />
  <path d="M 840 620 L 910 665" class="dash" />
  <path d="M 450 665 L 400 560" class="arrow" />
  <path d="M 910 665 L 960 560" class="arrow" />
  <text x="303" y="605" class="flow">loop 派生只读上下文给 model</text>
  <text x="920" y="605" class="flow">loop 派生最小执行上下文给 executor</text>

  <rect x="40" y="800" rx="18" ry="18" width="1280" height="140" fill="#fff8e8" class="layer" />
  <text x="66" y="830" class="section">PROTOCOLS AND EVENTS</text>
  <rect x="120" y="852" rx="12" ry="12" width="220" height="62" class="box" />
  <text x="144" y="880" class="box-title">AgentAction</text>
  <text x="144" y="901" class="small-text">final_answer | builtin_call</text>
  <rect x="390" y="852" rx="12" ry="12" width="230" height="62" class="box" />
  <text x="414" y="880" class="box-title">BuiltinResult</text>
  <text x="414" y="901" class="small-text">ok + output</text>
  <rect x="670" y="852" rx="12" ry="12" width="250" height="62" class="box" />
  <text x="694" y="880" class="box-title">AgentTraceItem</text>
  <text x="694" y="901" class="small-text">model_decision / action_result</text>
  <rect x="970" y="852" rx="12" ry="12" width="270" height="62" class="box" />
  <text x="994" y="880" class="box-title">Messages</text>
  <text x="994" y="901" class="small-text">user / tool / assistant</text>

  <path d="M 610 660 L 610 800 L 230 800 L 230 852" class="dash" />
  <path d="M 750 660 L 750 800 L 505 800 L 505 852" class="dash" />
  <path d="M 680 660 L 680 800 L 795 800 L 795 852" class="dash" />
  <path d="M 820 660 L 820 800 L 1105 800 L 1105 852" class="dash" />
  <path d="M 1160 505 L 1180 505 L 1180 246" class="dash" />

  <text x="1018" y="518" class="note">builtin_call 执行后写入 tool message，再继续下一轮</text>
  <text x="514" y="742" class="note">`cloneReadonly()` 通过 structuredClone + deepFreeze 派生边界对象</text>
  <text x="940" y="260" class="note">最终完成或达到 maxSteps 后返回统一结果</text>
</svg>
