<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1080" viewBox="0 0 1440 1080" role="img" aria-labelledby="title desc">
  <title id="title">Tool Protocol Agent Loop Architecture</title>
  <desc id="desc">Architecture diagram showing tool calling as an action-to-observation protocol with readonly execution context and loop-owned state.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fbff" />
      <stop offset="100%" stop-color="#eef5f7" />
    </linearGradient>
    <linearGradient id="loopFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fff7" />
      <stop offset="100%" stop-color="#edf7ef" />
    </linearGradient>
    <linearGradient id="protocolFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf4" />
      <stop offset="100%" stop-color="#fff6dc" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f6d7f" />
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #17324a; }
      .subtitle { font: 14px Arial, sans-serif; fill: #53697a; }
      .section { font: 700 15px Arial, sans-serif; fill: #1e3345; letter-spacing: 1px; }
      .box-title { font: 700 18px Arial, sans-serif; fill: #182736; }
      .box-text { font: 13px Arial, sans-serif; fill: #456173; }
      .small-text { font: 12px Arial, sans-serif; fill: #5d7588; }
      .note { font: 12px Arial, sans-serif; fill: #667d90; }
      .layer { stroke: rgba(33, 50, 69, 0.11); stroke-width: 1; }
      .box { fill: rgba(255, 255, 255, 0.96); stroke: rgba(33, 50, 69, 0.13); stroke-width: 1; }
      .soft { fill: rgba(255, 255, 255, 0.82); stroke: rgba(33, 50, 69, 0.10); stroke-width: 1; }
      .center-box { fill: url(#loopFill); stroke: rgba(33, 50, 69, 0.16); stroke-width: 1.2; }
      .protocol-box { fill: url(#protocolFill); stroke: rgba(100, 81, 29, 0.20); stroke-width: 1; }
      .chip { fill: rgba(255, 255, 255, 0.92); stroke: rgba(33, 50, 69, 0.11); stroke-width: 1; }
      .arrow { fill: none; stroke: #4f6d7f; stroke-width: 2.3; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #839cac; stroke-width: 2; stroke-dasharray: 6 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1440" height="1080" fill="url(#bg)" />

  <text x="56" y="58" class="title">Tool Protocol Minimal Agent Loop</text>
  <text x="56" y="86" class="subtitle">当前实现的重点从“builtin 调用”推进到“action -> observation 协议”，并把 tool、clarification、handoff 清晰分层。</text>

  <rect x="36" y="118" rx="20" ry="20" width="1368" height="136" fill="#eaf4ff" class="layer" />
  <text x="64" y="148" class="section">ENTRY AND OUTCOME</text>

  <rect x="100" y="174" rx="12" ry="12" width="260" height="60" class="box" />
  <text x="124" y="200" class="box-title">User Input</text>
  <text x="124" y="220" class="small-text">例如: Where is order ORD-1001?</text>

  <rect x="484" y="174" rx="12" ry="12" width="310" height="60" class="box" />
  <text x="508" y="200" class="box-title">runDemo()</text>
  <text x="508" y="220" class="small-text">组装 DemoModel + DemoExecutor + permissions</text>

  <rect x="934" y="166" rx="12" ry="12" width="350" height="76" class="soft" />
  <text x="958" y="194" class="box-title">AgentRunResult</text>
  <text x="958" y="215" class="small-text">status / answer / question / handoffReason</text>
  <text x="958" y="233" class="small-text">steps / modelCallCount / toolCallCount / trace</text>

  <path d="M 360 204 L 484 204" class="arrow" />
  <path d="M 640 234 L 640 336" class="arrow" />

  <rect x="36" y="288" rx="20" ry="20" width="1368" height="530" fill="#effbf1" class="layer" />
  <text x="64" y="318" class="section">CONTROL, STATE, AND EXECUTION BOUNDARIES</text>

  <rect x="86" y="372" rx="14" ry="14" width="318" height="220" class="box" />
  <text x="112" y="405" class="box-title">ModelClient</text>
  <text x="112" y="428" class="box-text">decideNextAction(context)</text>
  <rect x="112" y="454" rx="10" ry="10" width="266" height="112" class="soft" />
  <text x="132" y="482" class="box-title">DemoModel</text>
  <text x="132" y="504" class="small-text">缺订单号: ask_user</text>
  <text x="132" y="523" class="small-text">高风险词: handoff_to_human</text>
  <text x="132" y="542" class="small-text">正常路径: lookupOrder -> draftReply -> final_answer</text>

  <rect x="460" y="336" rx="20" ry="20" width="468" height="408" class="center-box" />
  <text x="494" y="376" class="box-title">AgentLoop</text>
  <text x="494" y="400" class="box-text">runAgentLoop()</text>
  <text x="494" y="427" class="small-text">唯一状态推进者: 记录 trace、messages、status，派生只读上下文，决定何时终止</text>

  <rect x="518" y="456" rx="12" ry="12" width="352" height="214" class="protocol-box" />
  <text x="544" y="488" class="box-title">AgentSessionState</text>
  <text x="544" y="513" class="small-text">sessionId / traceId / userId / currentStep</text>
  <text x="544" y="533" class="small-text">status / permissions / messages / trace / metadata</text>
  <text x="544" y="553" class="small-text">modelCallCount / toolCallCount</text>
  <text x="544" y="582" class="small-text">loop 内部真实状态</text>
  <text x="544" y="601" class="small-text">executor 和 model 只能拿到派生视图</text>
  <text x="544" y="630" class="small-text">`steps` 对外使用 `modelCallCount` 表示决策轮次</text>

  <rect x="986" y="372" rx="14" ry="14" width="334" height="220" class="box" />
  <text x="1012" y="405" class="box-title">ActionExecutor</text>
  <text x="1012" y="428" class="box-text">executeToolCall(action, context)</text>
  <rect x="1012" y="454" rx="10" ry="10" width="282" height="112" class="soft" />
  <text x="1032" y="482" class="box-title">ToolRegistry</text>
  <text x="1032" y="504" class="small-text">按 toolName 查找 ToolDefinition</text>
  <text x="1032" y="523" class="small-text">先 validate(input) 再 execute(input, context)</text>
  <text x="1032" y="542" class="small-text">只返回 ToolObservation，不直接改 state</text>

  <rect x="180" y="640" rx="12" ry="12" width="244" height="110" class="chip" />
  <text x="202" y="670" class="box-title">ModelContextView</text>
  <text x="202" y="692" class="small-text">readonly snapshot</text>
  <text x="202" y="711" class="small-text">recentEvents / messages / permissions</text>
  <text x="202" y="730" class="small-text">modelCallCount / toolCallCount</text>

  <rect x="1018" y="640" rx="12" ry="12" width="244" height="110" class="chip" />
  <text x="1040" y="670" class="box-title">ExecutionContext</text>
  <text x="1040" y="692" class="small-text">readonly runtime context</text>
  <text x="1040" y="711" class="small-text">sessionId / currentStep / traceId</text>
  <text x="1040" y="730" class="small-text">userId / permissions / metadata</text>

  <path d="M 460 496 L 404 496" class="arrow" />
  <path d="M 928 496 L 986 496" class="arrow" />
  <path d="M 520 648 L 424 695" class="dash" />
  <path d="M 872 648 L 1018 695" class="dash" />
  <path d="M 424 695 L 404 592" class="arrow" />
  <path d="M 1018 695 L 986 592" class="arrow" />

  <text x="204" y="620" class="note">loop 使用 structuredClone + deepFreeze 派生 model 侧只读视图</text>
  <text x="930" y="620" class="note">execution context 只读，不暴露可变 session state</text>

  <rect x="36" y="850" rx="20" ry="20" width="1368" height="188" fill="#fff8e7" class="layer" />
  <text x="64" y="880" class="section">PROTOCOL SURFACES</text>

  <rect x="94" y="912" rx="12" ry="12" width="258" height="86" class="box" />
  <text x="118" y="941" class="box-title">AgentAction</text>
  <text x="118" y="963" class="small-text">final_answer / ask_user</text>
  <text x="118" y="982" class="small-text">handoff_to_human / tool_call</text>

  <rect x="396" y="912" rx="12" ry="12" width="266" height="86" class="box" />
  <text x="420" y="941" class="box-title">ToolDefinition</text>
  <text x="420" y="963" class="small-text">name / description / validate()</text>
  <text x="420" y="982" class="small-text">execute(input, readonly context)</text>

  <rect x="708" y="912" rx="12" ry="12" width="266" height="86" class="box" />
  <text x="732" y="941" class="box-title">ToolObservation</text>
  <text x="732" y="963" class="small-text">callId / toolName / ok</text>
  <text x="732" y="982" class="small-text">output or error</text>

  <rect x="1018" y="912" rx="12" ry="12" width="324" height="86" class="box" />
  <text x="1042" y="941" class="box-title">Trace And Messages</text>
  <text x="1042" y="963" class="small-text">model_decision / tool_observation</text>
  <text x="1042" y="982" class="small-text">user / tool / assistant messages</text>

  <path d="M 620 744 L 620 850 L 224 850 L 224 912" class="dash" />
  <path d="M 690 744 L 690 850 L 529 850 L 529 912" class="dash" />
  <path d="M 756 744 L 756 850 L 841 850 L 841 912" class="dash" />
  <path d="M 824 744 L 824 850 L 1180 850 L 1180 912" class="dash" />
  <path d="M 1160 372 L 1160 252" class="dash" />

  <text x="1032" y="252" class="note">完成、追问、转人工、或达到 maxSteps 后返回统一结果</text>
  <text x="1080" y="568" class="note">lookupOrder 和 draftReply 是 tool</text>
  <text x="132" y="568" class="note">ask_user 和 handoff_to_human 是非工具 action</text>
</svg>
