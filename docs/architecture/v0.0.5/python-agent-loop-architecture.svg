<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" fill="none">
  <rect width="1200" height="720" fill="#F7F3EA"/>
  <rect x="60" y="60" width="1080" height="600" rx="24" fill="#FFFDF7" stroke="#2F2A24" stroke-width="2"/>
  <text x="90" y="110" fill="#2F2A24" font-family="Georgia, serif" font-size="30" font-weight="700">AgentLanguageLab Python Runtime</text>
  <text x="90" y="145" fill="#5C5247" font-family="Georgia, serif" font-size="18">Python is the single active implementation. The loop stays small and inspectable.</text>

  <rect x="100" y="190" width="250" height="120" rx="18" fill="#D9E7D6" stroke="#2F2A24" stroke-width="2"/>
  <text x="125" y="230" fill="#2F2A24" font-family="Courier New, monospace" font-size="24" font-weight="700">run_demo()</text>
  <text x="125" y="265" fill="#2F2A24" font-family="Courier New, monospace" font-size="17">load .env.local</text>
  <text x="125" y="290" fill="#2F2A24" font-family="Courier New, monospace" font-size="17">build model + executor</text>

  <rect x="420" y="190" width="360" height="200" rx="18" fill="#F8E3C7" stroke="#2F2A24" stroke-width="2"/>
  <text x="450" y="230" fill="#2F2A24" font-family="Courier New, monospace" font-size="24" font-weight="700">run_agent_loop()</text>
  <text x="450" y="265" fill="#2F2A24" font-family="Courier New, monospace" font-size="17">owns session state</text>
  <text x="450" y="290" fill="#2F2A24" font-family="Courier New, monospace" font-size="17">creates model context view</text>
  <text x="450" y="315" fill="#2F2A24" font-family="Courier New, monospace" font-size="17">records trace + tool messages</text>
  <text x="450" y="340" fill="#2F2A24" font-family="Courier New, monospace" font-size="17">handles final / ask_user / handoff</text>
  <text x="450" y="365" fill="#2F2A24" font-family="Courier New, monospace" font-size="17">enforces max_steps</text>

  <rect x="850" y="190" width="250" height="120" rx="18" fill="#D6E3F3" stroke="#2F2A24" stroke-width="2"/>
  <text x="880" y="230" fill="#2F2A24" font-family="Courier New, monospace" font-size="24" font-weight="700">DemoModel</text>
  <text x="880" y="265" fill="#2F2A24" font-family="Courier New, monospace" font-size="17">decide_next_action()</text>
  <text x="880" y="290" fill="#2F2A24" font-family="Courier New, monospace" font-size="17">returns AgentAction</text>

  <rect x="850" y="360" width="250" height="140" rx="18" fill="#F0D8D8" stroke="#2F2A24" stroke-width="2"/>
  <text x="880" y="400" fill="#2F2A24" font-family="Courier New, monospace" font-size="24" font-weight="700">DemoExecutor</text>
  <text x="880" y="435" fill="#2F2A24" font-family="Courier New, monospace" font-size="17">lookup_order</text>
  <text x="880" y="460" fill="#2F2A24" font-family="Courier New, monospace" font-size="17">draft_reply</text>
  <text x="880" y="485" fill="#2F2A24" font-family="Courier New, monospace" font-size="17">returns ToolObservation</text>

  <rect x="100" y="400" width="250" height="120" rx="18" fill="#EEE4CF" stroke="#2F2A24" stroke-width="2"/>
  <text x="125" y="440" fill="#2F2A24" font-family="Courier New, monospace" font-size="24" font-weight="700">runtime_model</text>
  <text x="125" y="475" fill="#2F2A24" font-family="Courier New, monospace" font-size="17">demo -> DemoModel</text>
  <text x="125" y="500" fill="#2F2A24" font-family="Courier New, monospace" font-size="17">dev -> not implemented</text>

  <path d="M350 250H420" stroke="#2F2A24" stroke-width="3"/>
  <path d="M780 250H850" stroke="#2F2A24" stroke-width="3"/>
  <path d="M780 430H850" stroke="#2F2A24" stroke-width="3"/>
  <path d="M225 400V330" stroke="#2F2A24" stroke-width="3"/>
  <path d="M225 330H420" stroke="#2F2A24" stroke-width="3"/>

  <text x="455" y="420" fill="#5C5247" font-family="Georgia, serif" font-size="18">Shared protocol: AgentAction / ToolObservation / AgentRunResult</text>
  <text x="455" y="450" fill="#5C5247" font-family="Georgia, serif" font-size="18">Current focus: clear loop structure, not provider integrations</text>
</svg>
